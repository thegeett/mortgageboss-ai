# Pre-commit hooks configuration
# See https://pre-commit.com for details
# Install: pre-commit install
# Run manually on all files: pre-commit run --all-files

repos:
  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.(md|markdown)$' # markdown uses trailing whitespace for line breaks
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Secret detection (detect-secrets — pure Python, no external toolchain needed)
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # Python: ruff for linting and formatting.
  # Pinned to match the ruff version locked in backend/uv.lock so the
  # pre-commit formatter and the CI `ruff format --check` never disagree.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # TypeScript/JavaScript: biome
  - repo: https://github.com/biomejs/pre-commit
    rev: v0.5.0
    hooks:
      - id: biome-check
        # Hooks run from the repo root, but biome.json lives in frontend/.
        # Point biome at it so the hook uses the project's space indentation
        # (matching `pnpm lint` and CI) instead of biome's tab default.
        args: ["--config-path", "frontend"]
        files: ^frontend/.*\.(ts|tsx|js|jsx|json)$
        additional_dependencies: ["@biomejs/biome@1.9.4"]

# Configuration
default_language_version:
  python: python3.12

# Reserved for pre-commit.ci (no-op locally)
ci:
  skip: []
