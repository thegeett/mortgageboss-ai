# Local development services for MortgageBoss AI.
#
# Usage:
#   docker compose up -d      # start everything in the background
#   docker compose ps         # check health
#   docker compose down       # stop & remove containers (data persists in volumes)
#   docker compose down -v    # also remove volumes (DESTROYS local data)
#
# NOTE: Credentials below are development-only and intentionally committed.
#       Production credentials come from the hosting platform's environment.
#       See decisions.md ADR-005.

services:
  postgres:
    image: postgres:16-alpine
    container_name: mortgageboss-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mortgageboss
      POSTGRES_PASSWORD: mortgageboss_dev_password
      POSTGRES_DB: mortgageboss_dev
    ports:
      - "5432:5432"
    volumes:
      - mortgageboss-postgres-data:/var/lib/postgresql/data
    networks:
      - mortgageboss-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mortgageboss -d mortgageboss_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: mortgageboss-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - mortgageboss-redis-data:/data
    networks:
      - mortgageboss-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mortgageboss-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - mortgageboss-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Celery worker (LP-41) — background task processing, a SEPARATE process from the
  # API. Starts BY DEFAULT (LP-73): a normal `docker compose up -d` brings it up, so
  # the async/AI features (document processing, the AI needs reasoning) never silently
  # fail because no worker is consuming — that was a recurring Phase-2 footgun (the
  # worker used to be behind a "worker" profile). Requires backend/.env (the app's
  # required settings, e.g. ANTHROPIC_API_KEY). After a code change, rebuild it:
  #   docker compose up -d --build worker
  # (locally you can instead run, from backend/:
  #   uv run celery -A app.tasks.celery_app worker --loglevel=info
  #   # on macOS/Colima add --pool=solo if the prefork pool misbehaves)
  worker:
    build: ./backend
    container_name: mortgageboss-worker
    restart: unless-stopped
    command: ["uv", "run", "celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info"]
    env_file:
      - ./backend/.env
    environment:
      # Override host-based URLs with the Compose service names (the container
      # reaches Postgres/Redis over the Compose network, not localhost).
      DATABASE_URL: postgresql+asyncpg://mortgageboss:mortgageboss_dev_password@postgres:5432/mortgageboss_dev  # pragma: allowlist secret
      REDIS_URL: redis://redis:6379/0
    volumes:
      # SHARED STORAGE — the API runs on the HOST and writes uploaded files to
      # backend/storage (STORAGE_LOCAL_PATH=./storage). The worker runs here in the
      # container (WORKDIR /app), so its ./storage → /app/storage. Without this mount
      # that directory is empty and every document fails to PROCESS with a StorageError
      # at read time (the worker can't see the host's files). Mount the SAME host
      # backend/storage into the container so both read/write one storage root.
      # NOTE: the relative ./storage is the trap (it resolves to different real dirs on
      # host vs. container). The robust long-term answer is object storage (S3/MinIO —
      # already supported via storage_backend) so host + worker share a network store.
      - ./backend/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mortgageboss-network

volumes:
  mortgageboss-postgres-data:
  mortgageboss-redis-data:

networks:
  mortgageboss-network:
    driver: bridge
