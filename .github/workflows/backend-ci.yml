name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    name: Lint, Type Check, and Test
    runs-on: ubuntu-latest

    # Database-backed tests (LP-10+) use a real Postgres via the db_session
    # fixture, which creates a separate `<db>_test` database and builds the
    # schema with create_all. Provision Postgres as a service so those tests can
    # connect; the credentials/db below match the DATABASE_URL used by pytest.
    #
    # Redis is provisioned too (LP-73): the real-stack tests exercise the actual
    # loop-aware Redis client + the per-file lock against REAL Redis (the de-patched
    # concurrency test, tests/core/test_redis_loop.py), and the Celery broker is Redis
    # (so an enqueue in an endpoint test connects instead of hanging on retries). The
    # whole point of the phase's hardening is testing the real seams, not mocks.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test  # pragma: allowlist secret  (ephemeral CI service, not a secret)
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify lock file is up to date
        run: uv lock --check

      - name: Run ruff linter
        run: uv run ruff check .

      - name: Check ruff formatting
        run: uv run ruff format --check .

      - name: Run mypy type checking
        run: uv run mypy app/

      - name: Run pytest
        run: uv run pytest -v --tb=short
        env:
          # Dummy values for required settings. Tests that need real services
          # tolerate their absence (health checks return 503, asserted as such).
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: test-key-for-ci
          JWT_SECRET_KEY: ci-test-secret-key-that-is-at-least-32-chars
          # Throwaway Fernet key for CI only — never used outside the test run.
          ENCRYPTION_KEY: iqh0Ofmzznt_dQRARaKEfFW2NSZ9k3lrzqTx3OFis14=  # pragma: allowlist secret
